server:
  port: 8105
spring:
  application:
    name: coffee-stat-service
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/coffee_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
